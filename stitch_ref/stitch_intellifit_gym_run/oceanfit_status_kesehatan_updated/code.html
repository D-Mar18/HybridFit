<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 105, 111, 0.1);
        }
        .option-active {
            border: 2px solid #00696f !important;
            background: rgba(0, 241, 254, 0.05);
        }

            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Header Section -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface/80 backdrop-blur-xl shadow-sm">
<button aria-label="Kembali" class="w-10 h-10 flex items-center justify-center rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Hybrid Fit</h1>
<div class="w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-32 pb-44 px-margin-mobile md:px-margin-desktop flex justify-center">
<div class="w-full max-w-2xl">
<!-- Intro Text -->
<div class="mb-stack-lg">
<div class="flex justify-between items-end mb-2">
<span class="font-label-md text-label-md text-primary uppercase tracking-wider">Status Kesehatan</span>
<span class="font-label-md text-label-md text-on-surface-variant">Langkah 4 dari 4</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary w-full rounded-full animate-pulse-slow"></div>
</div>
</div>
<section class="mb-section-gap">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background leading-tight mb-stack-md">
                Status Kesehatan
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                Keamanan Anda adalah prioritas kami. Beritahu kami jika Anda memiliki kondisi kesehatan atau batasan fisik tertentu.
            </p>
</section>
<!-- Survey Options -->
<div class="space-y-4" id="healthOptions"><!-- Option 1 -->
<button class="glass-card w-full p-5 rounded-xl text-left transition-all duration-200 active:scale-[0.98] shadow-[0_4px_12px_rgba(0,33,71,0.04)] group border-2 border-transparent" onclick="selectOption(this)">
<div class="flex items-center justify-between">
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Tidak ada (Sehat)</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Saya siap melakukan aktivitas fisik intensitas tinggi.</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-[.option-active]:border-secondary group-[.option-active]:bg-secondary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-[16px] hidden group-[.option-active]:block">check</span>
</div>
</div>
</button>
<!-- Option 2 -->
<button class="glass-card w-full p-5 rounded-xl text-left transition-all duration-200 active:scale-[0.98] shadow-[0_4px_12px_rgba(0,33,71,0.04)] group border-2 border-transparent" onclick="selectOption(this)">
<div class="flex items-center justify-between">
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Cedera Sendi/Otot</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Cedera pada area bahu, lutut, punggung, atau pergelangan kaki.</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-[.option-active]:border-secondary group-[.option-active]:bg-secondary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-[16px] hidden group-[.option-active]:block">check</span>
</div>
</div>
</button>
<!-- Option 3 -->
<button class="glass-card w-full p-5 rounded-xl text-left transition-all duration-200 active:scale-[0.98] shadow-[0_4px_12px_rgba(0,33,71,0.04)] group border-2 border-transparent" onclick="selectOption(this)">
<div class="flex items-center justify-between">
<div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-1">Kondisi Jantung</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Riwayat hipertensi atau gangguan ritme jantung.</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-[.option-active]:border-secondary group-[.option-active]:bg-secondary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-[16px] hidden group-[.option-active]:block">check</span>
</div>
</div>
</button>

</div></div>

<footer class="fixed bottom-0 left-0 w-full p-container-margin bg-surface/90 backdrop-blur-xl z-50">
<div class="max-w-md mx-auto flex flex-col gap-4">
<button class="w-full h-14 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-headline-md flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all duration-200 animate-pulse-slow" id="finish-btn">SELESAI<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>


</div>
</footer>
<script>
    function toggleSelect(element) {
        const options = document.querySelectorAll('#healthOptions button');
        
        // Logic for "Tidak ada (Sehat)" - if selected, unselect others
        const isHealthy = element.querySelector('h3').textContent.includes("Tidak ada");
        
        if (isHealthy) {
            options.forEach(opt => opt.classList.remove('health-card-selected'));
            element.classList.add('health-card-selected');
        } else {
            // If selecting a condition, make sure "Healthy" is unselected
            options.forEach(opt => {
                if (opt.querySelector('h3').textContent.includes("Tidak ada")) {
                    opt.classList.remove('health-card-selected');
                }
            });
            element.classList.toggle('health-card-selected');
        }
        
        // Haptic feedback simulation
        if (window.navigator.vibrate) {
            window.navigator.vibrate(10);
        }
    }
</script>
