<script>
        function selectOption(element) {
            // Remove active class from all
            const options = document.querySelectorAll('#options-container button');
            options.forEach(opt => opt.classList.remove('option-active'));
            
            // Add to selected
            element.classList.add('option-active');
            
            // Enable finish button
            const btn = document.getElementById('finish-btn');
            btn.disabled = false;
            btn.classList.add('animate-pulse-slow');
            
            // Subtle feedback
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        document.getElementById('finish-btn').addEventListener('click', function() {
            this.innerHTML = `
                <span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span>
                Menyiapkan Rencana...
            `;
            setTimeout(() => {
                alert('Pilihan Anda tersimpan! Menuju Dashboard OceanFit...');
            }, 1000);
        });
