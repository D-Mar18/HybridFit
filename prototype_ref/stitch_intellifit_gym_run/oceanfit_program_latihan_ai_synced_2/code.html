<script>
    // Tab switching logic
    const tabs = document.querySelectorAll('nav button');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => {
                t.classList.remove('bg-primary', 'text-on-primary', 'shadow-md', 'shadow-primary/20');
                t.classList.add('bg-surface-container-high', 'text-on-surface-variant');
            });
            tab.classList.add('bg-primary', 'text-on-primary', 'shadow-md', 'shadow-primary/20');
            tab.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
        });
    });
</script>
